name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    container: node:18-bullseye
    env:
      ROLLUP_DISABLE_NATIVE: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies (deterministic, skip optional)
        run: npm ci --no-optional

      - name: Create rollup native stub (one-time workaround)
        run: |
          mkdir -p node_modules/@rollup/rollup-linux-x64-gnu
          printf "module.exports = require('rollup');" > node_modules/@rollup/rollup-linux-x64-gnu/index.js

      - name: Ensure Rollup 3.x is installed (one-time override)
        run: npm i rollup@3 --no-save

      - name: Build
        run: ROLLUP_DISABLE_NATIVE=1 node ./node_modules/vite/bin/vite.js build
        env:
          GITHUB_PAGES: 'true'

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_dir: ./dist
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
