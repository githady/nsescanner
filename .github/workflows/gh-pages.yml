name: Deploy to GitHub Pages

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    container: node:18-bullseye
    env:
      ROLLUP_DISABLE_NATIVE: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies (deterministic, skip optional)
        run: npm ci --no-optional

      # Rollup is pinned in devDependencies (rollup@3) to avoid native binding issues.

      - name: Build
        run: ROLLUP_DISABLE_NATIVE=1 node ./node_modules/vite/bin/vite.js build
        env:
          GITHUB_PAGES: 'true'

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_dir: ./dist
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
